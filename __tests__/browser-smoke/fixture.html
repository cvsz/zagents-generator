<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>@zagents/kernel browser smoke</title>
</head>
<body>
  <h1>@zagents/kernel browser smoke test</h1>
  <pre id="output">loading…</pre>

  <script type="module">
    const output = document.getElementById('output');
    function log(msg) { output.textContent += '\n' + msg; }
    output.textContent = 'Starting smoke test...';

    try {
      // Browser-side import via bundler-style URL. In a real run, the
      // bundler (Vite / esbuild / webpack / Rollup) resolves this to
      // the wasm-pack output under @zagents/kernel/pkg/.
      const mod = await import('/pkg/ruflo_kernel_wasm.js');
      if (typeof mod.default === 'function') {
        await mod.default();
        log('wasm-bindgen init() succeeded');
      }
      const info = mod.kernelInfo();
      log('kernelInfo: ' + JSON.stringify(info));

      const okSpec = JSON.stringify({
        name: 'demo', command: ['npx', '-y', 'demo'],
      });
      const ok = mod.mcpValidate(okSpec);
      log('mcpValidate (well-formed): ' + (ok === null ? 'null (pass)' : 'FAIL: ' + ok));

      const bad = mod.mcpValidate(JSON.stringify({ name: '', command: ['x'] }));
      log('mcpValidate (empty name): ' + (typeof bad === 'string' && bad.includes('empty')
        ? 'rejected (pass)' : 'FAIL: ' + bad));

      window.__SMOKE_RESULT = { ok: true };
      log('\nResult: PASS');
    } catch (err) {
      log('\nResult: FAIL — ' + (err.message ?? String(err)));
      window.__SMOKE_RESULT = { ok: false, error: String(err) };
    }
  </script>
</body>
</html>
