# Codex skill: release-readiness umbrella validator.
#
# Wraps the `gemini validate` subcommand from create-agent-gemini's
# `gemini` binary. Runs doctor + verify + path-guard + mcp + secrets
# in one shot, returns a structured PASS/FAIL per check.

[skill]
name = "validate-gemini"
version = "0.1.0"
description = "Release-readiness umbrella check for a scaffolded gemini — runs doctor, witness verify, hardcoded-path scan, MCP server config, and GCP Secret Manager validation in one shot. Exits non-zero if any sub-check fails."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/cvsz/zagents-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "zagents-generator"
tool = "validate_harness"

[command]
name = "validate-gemini"
synopsis = "Run all 5 release-readiness gates on a generated gemini"

[[args]]
name = "path"
prompt = "Path to the gemini directory"
default = "."

[[args]]
name = "skip_gcp"
prompt = "Skip the GCP Secret Manager gate (use offline)?"
default = "false"
choices = ["true", "false"]

[[args]]
name = "secret"
prompt = "GCP Secret Manager secret name to verify (default NPM_TOKEN)"
default = "NPM_TOKEN"

[catalog]
tags = ["release", "validation", "gcp", "secrets", "witness", "ci"]
