# Codex skill: diff two scaffolded harnesses.
#
# Wraps the iter-105 `gemini compare a/ b/` CLI command. Answers the
# question "yours and mine scaffolded different things — what changed?"
# Reports: manifest meta drift (name, kernel, surface, host list) +
# per-file SHA-256 fingerprints (added / removed / changed). Exit 0 on
# IDENTICAL, 1 on DRIFT, 2 if either side has no manifest. Supports
# `--bundle` (ADR-031 schema-1 JSON envelope) for CI and support
# tickets.

[skill]
name = "compare-harnesses"
version = "0.1.0"
description = "Diff two scaffolded harnesses (ADR-031). Reports manifest meta drift + host list + per-file fingerprint changes (added/removed/changed). Exits 0 IDENTICAL, 1 DRIFT, 2 missing manifest. Use --bundle for the ADR-031 schema-1 JSON envelope."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/cvsz/zagents-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "zagents-generator"
tool = "compare_harnesses"

[command]
name = "compare-harnesses"
synopsis = "Diff two harnesses: manifest meta + host list + per-file fingerprints."

[[args]]
name = "a"
prompt = "Path to the first gemini directory"
required = true

[[args]]
name = "b"
prompt = "Path to the second gemini directory"
required = true

[[args]]
name = "bundle"
prompt = "Emit ADR-031 schema-1 bundle JSON (machine-readable; sanitised)"
required = false
default = "false"

[catalog]
tags = ["compare", "diff", "drift", "manifest", "fingerprint", "ADR-031", "ADR-030"]
