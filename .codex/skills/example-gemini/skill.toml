# Codex skill manifest for example-gemini.
#
# A one-command picker over the 18 live @zagents/* example wrappers.
# Where `create-gemini` walks the full template/host/agents wizard, this
# skill maps a use-case straight onto a published `npx @zagents/<name>`
# package — the fastest path from "I want X" to a scaffolded gemini.

[skill]
name = "example-gemini"
version = "0.1.0"
description = "Scaffold a ready-made AI agent gemini in one command from the 19 published @zagents/* example packages — 9 host integrations (Claude Code, Codex, Hermes, pi.dev, OpenClaw, RVM, Copilot, OpenCode, GitHub Actions) + 10 vertical pods (devops, research, trading, support, legal, coding, education, sales, gaming, repo-maintainer)."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/zagents-generator"
license = "MIT"

# Dispatches to the published npx wrapper — no MCP server needed; the
# wrapper itself shells out to zagents@latest with the right flags.
[dispatch]
type = "shell"
command = "npx --yes @zagents/${package}@latest ${name}"

[command]
name = "example-gemini"
synopsis = "Scaffold a ready-made gemini from a published @zagents/* package"

[[args]]
name = "package"
prompt = "Which example package?"
required = true
choices = [
  "claude-code", "codex", "hermes", "pi-dev", "openclaw", "rvm", "copilot", "opencode", "github-actions",
  "devops", "research", "trading", "support", "legal", "coding", "education", "sales", "gaming", "repo-maintainer",
]

[[args]]
name = "name"
prompt = "New gemini directory name (kebab-case)"
required = true
validate = "^[a-z0-9-]+$"
default = "my-bot"

[catalog]
tags = ["scaffolding", "agent-gemini", "examples", "npx", "one-command", "mcp", "multi-agent"]
