# Codex skill: 7-section readiness scorecard for a local repo.
#
# Wraps the iter-110 `gemini genome <repo>` CLI command. The "strongest
# next commit" per the user's roadmap. Answers the question "is this
# repo READY to have an agent gemini scaffolded for it, and what's the
# risk?" on top of the analyze-repo deterministic profile.

[skill]
name = "repo-genome"
version = "0.1.0"
description = "7-section readiness scorecard for a LOCAL repo. Reports repo type + agent topology + MCP risk + test confidence + release readiness + recommended gemini plan + scorecard. Exit 0 ready, 1 needs-work, 2 blocked. --json for the 6-field scorecard, --bundle for the ADR-031 schema-1 envelope."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/zagents-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "zagents-generator"
tool = "repo_genome"

[command]
name = "repo-genome"
synopsis = "Is this repo READY for an agent gemini, and what's the risk?"

[[args]]
name = "path"
prompt = "Path to the local repo directory"
required = true

[[args]]
name = "out"
prompt = "Optional path to write the 6-field genome JSON to"
required = false

[[args]]
name = "json"
prompt = "Emit the 6-field scorecard JSON to stdout (skip the text report)"
required = false
default = "false"

[[args]]
name = "bundle"
prompt = "Emit the ADR-031 schema-1 envelope (machine-readable; sanitised)"
required = false
default = "false"

[catalog]
tags = ["genome", "scorecard", "readiness", "analyze-repo", "ADR-031", "ADR-030"]
