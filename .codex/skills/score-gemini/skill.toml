# Codex skill: 5-dimension gemini scorecard with badges.
#
# Wraps the iter-111 `gemini score <path>` CLI command. Priority 2 from
# the user's roadmap: every scaffolded gemini gets a 0-100 score and a
# README-ready badge block so the output is legible and shareable.

[skill]
name = "score-gemini"
version = "0.1.0"
description = "5-dimension scorecard (0-100, grade A/B/C/F) for a scaffolded gemini. Dimensions: Repo understanding (25%), Agent usefulness (25%), MCP safety (20%), Test coverage (15%), Publish readiness (15%). Emits a 6-field badges block (score + mcpRisk + 4 booleans) ready for the gemini README. Exit 0 A/B, 1 C, 2 F."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/zagents-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "zagents-generator"
tool = "score_harness"

[command]
name = "score-gemini"
synopsis = "5-dimension 0-100 scorecard + README-ready badge block."

[[args]]
name = "path"
prompt = "Path to the gemini directory"
required = true

[[args]]
name = "out"
prompt = "Optional path to write the badges JSON to"
required = false

[[args]]
name = "json"
prompt = "Emit the badges JSON to stdout (skip the text report)"
required = false
default = "false"

[[args]]
name = "bundle"
prompt = "Emit the ADR-031 schema-1 envelope of the full scorecard"
required = false
default = "false"

[catalog]
tags = ["score", "scorecard", "badges", "ADR-031", "ADR-030"]
