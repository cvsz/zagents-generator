# Codex skill: ship the gemini you just generated.

[skill]
name = "publish-gemini"
version = "0.1.0"
description = "Publish a generated gemini to npm — runs the smoke test, signs the witness manifest, and dispatches `npm publish --provenance` from your tagged release."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/zagents-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "zagents-generator"
tool = "publish_harness"

[command]
name = "publish-gemini"
synopsis = "Smoke-test + witness-sign + npm publish for a generated gemini"

[[args]]
name = "path"
prompt = "Path to the gemini directory"
required = true

[[args]]
name = "dry_run"
prompt = "Dry run (no actual publish)?"
default = "true"
choices = ["true", "false"]

[catalog]
tags = ["publishing", "npm", "agent-gemini", "witness", "provenance"]
