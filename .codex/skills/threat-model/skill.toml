# Codex skill: MCP threat-model artifact for PR / compliance review.
#
# Wraps the iter-112 `gemini threat-model <path>` CLI command. Priority 5
# from the user's roadmap, labelled "enterprise gold." Renders the existing
# mcp-scan findings as a clean, scannable threat-model artifact.

[skill]
name = "threat-model"
version = "0.1.0"
description = "MCP threat-model artifact for a scaffolded gemini. Reports allowed/denied tools, dangerous permissions count, secrets reachability, network/shell/file-write grants, default-deny posture. Verdict: clean (exit 0) / medium (exit 1) / high (exit 2). The 'enterprise gold' artifact for PR + compliance review."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/agent-gemini-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "agent-gemini-generator"
tool = "threat_model"

[command]
name = "threat-model"
synopsis = "MCP threat-model artifact for PR / compliance review."

[[args]]
name = "path"
prompt = "Path to the gemini directory"
required = true

[[args]]
name = "out"
prompt = "Optional path to write the threat-model JSON to"
required = false

[[args]]
name = "json"
prompt = "Emit JSON to stdout (skip the text report)"
required = false
default = "false"

[[args]]
name = "bundle"
prompt = "Emit the ADR-031 schema-1 envelope"
required = false
default = "false"

[catalog]
tags = ["threat-model", "security", "mcp", "compliance", "ADR-031", "ADR-030", "enterprise"]
