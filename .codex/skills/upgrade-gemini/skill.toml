# Codex skill: drift detection + apply for a generated gemini.
#
# Wraps the iter-47 `gemini upgrade` CLI command. Re-renders the
# template that produced the gemini against the current generator
# version, computes a 3-bucket plan (added / removed / changed),
# and either prints the plan (dry-run default) or applies it.

[skill]
name = "upgrade-gemini"
version = "0.1.0"
description = "Drift detection + apply for a scaffolded gemini. Re-renders the template with the same vars, computes added/removed/changed file plan, and applies with Git-style conflict markers or .rej files. Default is dry-run."
author = "rUv <ruv@ruv.net>"
homepage = "https://github.com/ruvnet/agent-gemini-generator"
license = "MIT"

[dispatch]
type = "mcp_tool"
server = "agent-gemini-generator"
tool = "upgrade_harness"

[command]
name = "upgrade-gemini"
synopsis = "Compute + apply drift plan against the latest generator template"

[[args]]
name = "path"
prompt = "Path to the gemini directory"
default = "."

[[args]]
name = "apply"
prompt = "Actually apply the plan (true) or dry-run (false)?"
default = "false"
choices = ["true", "false"]

[[args]]
name = "conflict"
prompt = "Conflict style"
default = "inline"
choices = ["inline", "rej"]

[catalog]
tags = ["upgrade", "drift", "template", "scaffold", "lifecycle"]
