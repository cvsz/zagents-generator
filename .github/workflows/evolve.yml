name: Darwin Evolution

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Darwin Evolution
        run: npm run evolve
        env:
          # Optional: Pass an API key if the evolution tests require network (though Darwin claims safe/no-network by default)
          API_KEY: ${{ secrets.API_KEY }}

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(darwin): apply measured improvements from Darwin evolution'
          title: '🤖 Darwin Evolution: Automated Improvements'
          body: |
            This PR contains automated, measured improvements generated by `npm run evolve` (Darwin Mode).
            
            The evolution process has mutated the gemini configuration, tested the changes against the internal sandbox, and retained only the configurations that passed the safety gates and improved the success rate.
            
            Please review the changes before merging.
          branch: 'darwin-evolution-updates'
          base: 'master'
          labels: 'automation, darwin'
